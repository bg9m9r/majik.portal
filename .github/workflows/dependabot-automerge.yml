name: Dependabot auto-merge

# Enables auto-merge on ALL Dependabot PRs (including majors). Auto-merge still
# waits for the required status checks to pass before the PR actually merges, so
# a bump that breaks the build fails CI and never lands.
#
# Uses pull_request_target so the GITHUB_TOKEN is write-capable (a plain
# pull_request event from Dependabot gets a read-only token). This job never
# checks out or runs PR code — it only calls the GitHub API to flip auto-merge,
# so pull_request_target is safe here.
on:
  pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (all bumps — gated by required checks)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
