name: Feature request / enhancement
description: Propose a new feature, mechanic, card, or improvement.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check the existing issues and `MODERN_COVERAGE.md` (in `majik.core`) — many cards and mechanics are already tracked.

  - type: textarea
    id: problem
    attributes:
      label: What's the problem or use case?
      description: What can't you do today that you want to do?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Rough sketch of the change. Be concrete — file paths, APIs, UI flow.
    validations:
      required: true

  - type: textarea
    id: rules
    attributes:
      label: Rule citations (gameplay features only)
      description: Cite the relevant Comprehensive Rules sections from `MagicCompRules 20251114.txt`.
      placeholder: Rule 702.20 (Trample), Rule 509.1h
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.
    validations:
      required: false
