# Render Blueprint — Majik portal (Angular static site)
# Deploy: connect this repo (github.com/bg9m9r/majik.portal) as a Blueprint on Render.
#
# Secrets to set after first sync (Render dashboard → service → Environment):
#   MAJIK_API_URL           https://majik-api.onrender.com  (or custom domain — no trailing slash)
#   AUTH0_DOMAIN            auth.majik.tech                 (Auth0 custom domain, no scheme)
#   AUTH0_CLIENT_ID         <SPA app client id>
#   AUTH0_AUDIENCE          https://api.majik.tech          (Auth0 API identifier)
#   AUTH0_REDIRECT_URI      https://majik.tech/auth/callback
#
# Build step bakes these into src/environments/environment.production.ts before `ng build`,
# since Angular envs are compile-time. SignalR hub URL derives from MAJIK_API_URL.

services:
  - type: web
    name: majik-portal
    runtime: static
    autoDeploy: true
    buildCommand: |
      set -e
      npm ci
      # Regenerate the typed API client from the deployed API's OpenAPI doc.
      # src/app/core/api/ is gitignored, so we must rebuild it on every deploy.
      MAJIK_API="${MAJIK_API_URL}" npm run openapi
      cat > src/environments/environment.production.ts <<EOF
      export const environment = {
        production: true,
        commitSha: '${RENDER_GIT_COMMIT}',
        buildTime: '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
        apiBaseUrl: '${MAJIK_API_URL}',
        signalRHubUrl: '${MAJIK_API_URL}/hubs/match',
        auth0: {
          domain: '${AUTH0_DOMAIN}',
          clientId: '${AUTH0_CLIENT_ID}',
          audience: '${AUTH0_AUDIENCE}',
          redirectUri: '${AUTH0_REDIRECT_URI}'
        }
      };
      EOF
      npm run build
      # CSP injected as a <meta> tag so connect-src can be parameterized
      # on the deployed API + Auth0 origins without hard-coding them in
      # render.yaml. NOTE: meta CSP cannot enforce frame-ancestors —
      # covered by the X-Frame-Options: DENY header below.
      #
      # script-src is just `'self'` — Auth0 Universal Login is a full-
      # page redirect to the tenant domain, not an embedded iframe, so
      # nothing injects inline <script> tags into our document.
      DIST=dist/majik-portal/browser
      INDEX="${DIST}/index.html"
      API_WSS="$(printf '%s' "${MAJIK_API_URL}" | sed 's|^https://|wss://|; s|^http://|ws://|')"
      CSP="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://*.scryfall.io https://cards.scryfall.io https://api.scryfall.com; connect-src 'self' https://api.scryfall.com https://${AUTH0_DOMAIN} ${MAJIK_API_URL} ${API_WSS}; base-uri 'self'; form-action 'self'"
      sed -i "s|<head>|<head><meta http-equiv=\"Content-Security-Policy\" content=\"${CSP}\">|" "${INDEX}"
    staticPublishPath: ./dist/majik-portal/browser
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      # Content-Security-Policy is emitted as a <meta> tag in the build step
      # (see buildCommand above) so connect-src can include the deployed
      # ${MAJIK_API_URL} + ${AUTH0_DOMAIN} origins without hard-coding them
      # here. frame-ancestors is enforced by the X-Frame-Options: DENY
      # header above (meta CSP cannot enforce frame-ancestors).
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MAJIK_API_URL
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: AUTH0_REDIRECT_URI
        sync: false
